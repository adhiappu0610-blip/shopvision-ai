{% extends "base.html" %}
{% block content %}

<section class="auth-page">
    <div class="auth-card">
        <h1>Welcome Back 👋</h1>
        <p>Login to access your ShopVision AI dashboard</p>

        <form method="POST">
            <input type="email" name="email" placeholder="Enter email address" required>
            <input type="password" name="password" placeholder="Enter password" required>
            <button type="submit">Login</button>
        </form>

        <p class="small-text">Don't have an account? <a href="/register">Create account</a></p>
    </div>
</section>

{% endblock %}
