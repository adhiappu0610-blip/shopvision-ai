{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-box">

        <h1>Create Account 🚀</h1>

        <p>
            Start managing your supermarket with AI insights
        </p>

        <form method="POST">

            <input type="text"
                   name="username"
                   placeholder="Enter your full name"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Enter your email address"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Create password"
                   required>

            <button type="submit">
                Create Account
            </button>

        </form>

        <div class="bottom-text">
            Already have an account?
            <a href="/login">Login here</a>
        </div>

    </div>

</div>

{% endblock %}
